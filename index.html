<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JNJM Cookies Shop</title>

<style>
:root{
  --coklat:#7a4a2e;
  --coklatSoft:#f3e8df;
  --hijau:#9bbf9b;
  --hijauSoft:#e6f2e6;
}
.cookies-container{
  margin-top:20px;
  text-align:center;
  position:relative;
}

.cookie{
  display:inline-block;
  margin: 0 5px;
  animation:spin linear infinite;
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

*{
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  margin:0;
  background:linear-gradient(180deg,var(--coklatSoft),var(--hijauSoft));
}

/* HEADER */
header{
  background:var(--coklat);
  color:white;
  text-align:center;
  padding:30px 15px;
  animation:slideDown 1s ease;
}

header h1{
  margin:0;
  font-size:2.2rem;
}

header p{
  margin:8px 0;
}

/* EMOJI COOKIE BERPUTAR */
.cookie-emoji{
  margin-top:15px;
  font-size:90px;
  display:inline-block;
  animation:spin 8s linear infinite;
}

/* SECTION */
section{
  padding:35px 15px;


  <style>
    body {
      font-family: sans-serif;
      background: #f4fbf7;
      text-align: center;
    }

    .page {
      display: none;
    }

    .active {
      display: block;
    }

    .btn {
      background: #c7f0da;
      border: none;
      padding: 10px 25px;
      border-radius: 999px;
      cursor: pointer;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <!-- HALAMAN 1 -->
  <div id="page1" class="page active">
    <h2>Menu Produk</h2>
    <p>Ini halaman pertama</p>

    <button class="btn" onclick="pindah('page2')">Beli</button>
  </div>

  <!-- HALAMAN 2 -->
  <div id="page2" class="page">
    <h2>Checkout</h2>
    <p>Ini halaman kedua</p>

    <button class="btn" onclick="pindah('page1')">Kembali</button>
  </div>

  <script>
    function pindah(id) {
      document.getElementById("page1").classList.remove("active");
      document.getElementById("page2").classList.remove("active");
      document.getElementById(id).classList.add("active");
    }
  
.title{
  text-align:center;
  color:var(--coklat);
  margin-bottom:25px;
}

/* MENU */
.menu{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card{
  background:white;
  border-radius:18px;
  padding:15px;
  text-align:center;
  box-shadow:0 10px 20px rgba(0,0,0,.12);
  transition:.3s;
  animation:fadeUp .8s ease;
}

.card:hover{
  transform:translateY(-10px) scale(1.03);
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:12px;
}

.card h3{
  margin:10px 0 5px;
  color:var(--coklat);
}

.rating{
  color:gold;
}

.best{
  background:var(--hijau);
  color:white;
  padding:5px 12px;
  border-radius:20px;
  font-size:.8rem;
  display:inline-block;
  margin-top:5px;
}

/* FORM */
form{
  max-width:500px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:18px;
  box-shadow:0 10px 20px rgba(0,0,0,.12);
  animation:bounce 1.5s;
}

form input, form select, form textarea{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

form button{
  width:100%;
  padding:12px;
  background:var(--coklat);
  color:white;
  border:none;
  border-radius:10px;
  font-size:1rem;
  cursor:pointer;
}

form button:hover{
  background:var(--hijau);
}

/* FOOTER */
footer{
  background:var(--coklat);
  color:white;
  text-align:center;
  padding:15px;
}

/* ANIMATION */
@keyframes fadeUp{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes slideDown{
  from{opacity:0; transform:translateY(-30px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes bounce{
  0%,20%,50%,80%,100%{transform:translateY(0);}
  40%{transform:translateY(-10px);}
  60%{transform:translateY(-5px);}
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}
</style>
</head>
